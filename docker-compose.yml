# Default compose file — delegates to dev setup.
# For production, use:  docker compose -f docker-compose.prod.yml up -d
# For development DB:   docker compose -f docker-compose.dev.yml up -d

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lumora
      POSTGRES_PASSWORD: lumora_dev
      POSTGRES_DB: lumora
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

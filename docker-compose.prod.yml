version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lumora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-lumora}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lumora}"]
      interval: 5s
      timeout: 5s
      retries: 5

  scorer:
    build:
      context: ./scorer
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5001"
    environment:
      PORT: "5001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\" 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      scorer:
        condition: service_healthy
    environment:
      SCORER_URL: "http://scorer:5001"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-lumora}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-lumora}?schema=public"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env.production}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?Set CLERK_SECRET_KEY in .env.production}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:?Set CLERK_PUBLISHABLE_KEY in .env.production}
      PORT: "3001"
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BASE_URL: ${BASE_URL:-http://localhost}
      STORAGE_TYPE: ${STORAGE_TYPE:-filesystem}
      UPLOAD_DIR: /app/uploads
      EXPORT_DIR: /app/exports
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uploads:/app/uploads
      - exports:/app/exports

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"

volumes:
  pgdata:
  uploads:
  exports:

# Lumora — lumora.zilware.mu
# Drop this file in /etc/nginx/sites-available/lumora.zilware.mu
# then: sudo ln -s /etc/nginx/sites-available/lumora.zilware.mu /etc/nginx/sites-enabled/
# and:  sudo nginx -t && sudo systemctl reload nginx

# HTTP — redirect to HTTPS + allow Let's Encrypt ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name lumora.zilware.mu;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name lumora.zilware.mu;

    ssl_certificate     /etc/letsencrypt/live/lumora.zilware.mu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumora.zilware.mu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 15M;

    # API
    location /v1/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Uploaded files (served by backend)
    location /uploads/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Exports
    location /exports/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host $host;
    }

    # Frontend (React SPA)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
